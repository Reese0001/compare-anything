version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: compare-anything-postgres
    environment:
      POSTGRES_DB: compare_anything
      POSTGRES_USER: compare_anything
      POSTGRES_PASSWORD: compare_anything
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
